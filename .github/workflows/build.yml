name: Build VOID Portable

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas PyQt5 openpyxl watchdog pyinstaller xlrd xlwt xlsxwriter pywin32 pyminizip cryptography PyPDF2 PyMuPDF python-docx requests python-dotenv

    - name: Build VOID Executable
      # Adding --collect-all for xlwt to ensure the engine and metadata are physically copied
      run: pyinstaller --noconsole --onefile --icon="New_void_icon.ico" --name="VOID-App" --collect-all xlwt --hidden-import=xlwt --hidden-import=pandas.libs.tslibs.timedeltas --hidden-import=engine --hidden-import=win32com --hidden-import=win32com.client --hidden-import=pyminizip --hidden-import=cryptography --hidden-import=PyPDF2 --hidden-import=fitz --hidden-import=outlook_integration --hidden-import=encryption_utils main.py

    - name: Upload VOID Artifact
      uses: actions/upload-artifact@v4
      with:
        name: VOID-Portable-Payload
        path: dist/VOID-App.exe