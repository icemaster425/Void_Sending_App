name: Build VOID Portable

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  # Silence the deprecation warnings and opt-in to the 2026 standard
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas PyQt5 openpyxl watchdog pyinstaller xlrd xlwt xlsxwriter pywin32 pyminizip cryptography

    - name: Build VOID Executable
      run: |
        pyinstaller --noconsole --onefile --icon="New_void_icon.ico" --name="VOID-App" --hidden-import=pandas --hidden-import=openpyxl --hidden-import=xlrd --hidden-import=xlwt --hidden-import=xlsxwriter --hidden-import=engine --hidden-import=win32com --hidden-import=win32com.client --hidden-import=pyminizip --hidden-import=cryptography --hidden-import=outlook_integration --hidden-import=encryption_utils main.py

    - name: Upload VOID Artifact
      uses: actions/upload-artifact@v4
      with:
        name: VOID-Portable-Payload
        path: dist/VOID-App.exe