name: Build RIP Portable

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas PyQt5 openpyxl watchdog pyinstaller xlrd xlwt xlsxwriter

    - name: Build with PyInstaller
      run: |
        pyinstaller --noconsole --onefile --icon="fact.ico" --name "RIP-Checking App" --hidden-import "pandas" --hidden-import "openpyxl" --hidden-import "xlrd" --hidden-import "xlwt" --hidden-import "xlsxwriter" --hidden-import "engine" main.py

    - name: Upload EXE Artifact
      uses: actions/upload-artifact@v4
      with:
        name: RIP-Checking-App-Portable
        path: dist/RIP-Checking App.exe