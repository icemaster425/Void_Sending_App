name: Build VOID Portable

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        # Notice xlwt is completely gone from this list
        pip install pandas PyQt5 openpyxl watchdog pyinstaller xlrd xlsxwriter pywin32 pyminizip cryptography PyPDF2 PyMuPDF python-dotenv

    - name: Build VOID Executable
      # Lean, focused payload without the broken xlwt ghost
      run: pyinstaller --noconsole --onefile --icon="New_void_icon.ico" --name="VOID-App" --hidden-import=pandas --hidden-import=openpyxl --hidden-import=xlrd --hidden-import=win32com --hidden-import=win32com.client --hidden-import=pythoncom --hidden-import=pywintypes --hidden-import=pyminizip --hidden-import=fitz --hidden-import=outlook_integration --hidden-import=encryption_utils main.py

    - name: Upload VOID Artifact
      uses: actions/upload-artifact@v4
      with:
        name: VOID-Portable-Payload
        path: dist/VOID-App.exe