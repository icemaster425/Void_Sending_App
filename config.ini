[MONITORING]
# The file types the system will watch for. Separate with commas.
file_extensions = .xlsx,.xls,.pdf,.tiff,.tif,.jpg,.png
# The minimum number of digits for a batch number (e.g., 6 for '123456').
batch_length = 6
# How often (in seconds) the system scans the folder for new files.
check_interval = 5

[EMAIL]
# The format for the Outlook subject line. Available tags: {inst_code}, {date}, {batch_number}, {count}.
# {count} will now add the record count in brackets, e.g., (5).
subject_template = {inst_code} Loads {date} Batch {batch_number} ({count})
# The fallback message used only if the institution's record in the database is blank.
default_message = Please find the attached batch for your review.
# A universal message added to the very top of every email sent.
email_header = SYSTEM NOTIFICATION: New Batch Detected.
# A universal signature or disclaimer added to the very bottom of every email.
# The app will automatically append the selected username after this footer.
email_footer = Regards, 

# Toggles: Set to 'true' to enable or 'false' to keep hidden.
use_default_message = false
use_email_header = false
use_email_footer = true

[SYSTEM]
# The title displayed at the top of the application window.
app_title = V.O.I.D. - Verified On-boarding Institutional Dispatcher
# Logging detail level: INFO (standard) or DEBUG (highly detailed for troubleshooting).
log_level = INFO
# If 'true', a pop-up will ask for confirmation before clearing the monitored folder.
show_delete_confirmation = true
# Date format used across the entire application UI and DB.
date_format = %%d/%%m/%%Y

[Users]
# Comma-separated list of staff for the startup selection dropdown.
staff_list = Dony, Sminu, Nathanael, Mikhael

[SharedSettings]
# The path to the database on your network drive for multi-user syncing.
# Example: S:\VOID_Data\file_monitor.db
db_location = file_monitor.db

[Settings]
# Strict guard limit in MB. Drafts/Logging blocked if exceeded.
max_email_size = 10.0

[INSTITUTION_RECIPES]
# Define specific rules per Institution Code.
# Options: normal, tiff (grayscale), split_pdf (individual pages), 
# xls_to_xlsx, xlsx_to_xls, bsb_split (Splits Col A into BSB and Account)
ABC = normal
DEF = tiff
GHI = split_pdf
JKL = bsb_split
MNO = xls_to_xlsx